# ================================================================
#  pkgs-zodium — package build & release workflow
# ================================================================

name: Build packages

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - helium-drm
          - zodium-settings
          - fedora-logos
          - plasma-lookandfeel-fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p output/${{ matrix.package }}

      - name: Build ${{ matrix.package }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ matrix.package }}:/build/${{ matrix.package }}:ro" \
            -v "${{ github.workspace }}/output/${{ matrix.package }}:/output" \
            fedora:latest \
            bash /build/${{ matrix.package }}/build.sh

      - name: Verify RPM
        run: |
          ls -lh output/${{ matrix.package }}/
          [[ "$(ls output/${{ matrix.package }}/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.package }}
          path: output/${{ matrix.package }}/*.rpm
          retention-days: 1

  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        package:
          - helium-drm
          - zodium-settings
          - fedora-logos
          - plasma-lookandfeel-fedora

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rpms-${{ matrix.package }}
          path: rpms

      - name: List RPMs
        run: |
          echo "RPMs for ${{ matrix.package }}:"
          ls -lh rpms/

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ matrix.package }}" \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag \
            || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RPM_FILE=$(ls rpms/*.rpm | head -1)
          VERSION=$(rpm -qp --queryformat '%{VERSION}-%{RELEASE}' "$RPM_FILE")

          gh release create "${{ matrix.package }}" \
            --repo ${{ github.repository }} \
            --title "${{ matrix.package }}" \
            --latest=false \
            --notes "**version:** \`${VERSION}\`
**built:** \`$(date -u '+%Y-%m-%d %H:%M UTC')\`" \
            rpms/*.rpm