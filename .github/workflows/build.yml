# ================================================================
#  pkgs-zodium — package build & release workflow
# ================================================================

name: Build packages

on:
  push:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - ".keepalive"
  pull_request:
  schedule:
    - cron: "23 04 * * *"
    - cron: "47 08 * * *"
    - cron: "33 14 * * *"
    - cron: "17 19 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    name: Keepalive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Keepalive
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          LAST="$(cat .keepalive 2>/dev/null | cut -d' ' -f1 || true)"
          if [[ "${LAST}" == "${TODAY}" ]]; then
            echo "Keepalive already ran today (${TODAY}), skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%d %H:%M:%S" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive ${TODAY}"
          git push || true

  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - helium-drm
          - gui-cli
          - docker-ce
          - zydm-theme
          - zodium-settings
          - fedora-logos
          - plasma-lookandfeel-fedora
          - zutils-rs
          - vscode
          - virtio-win
          - wm-noctalia
          - udev-rules
          - nvidia-container-toolkit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p output/${{ matrix.package }}

      - name: Build ${{ matrix.package }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ matrix.package }}:/build/${{ matrix.package }}:ro" \
            -v "${{ github.workspace }}/output/${{ matrix.package }}:/output" \
            fedora:latest \
            bash /build/${{ matrix.package }}/build.sh

      - name: Verify RPM
        run: |
          ls -lh output/${{ matrix.package }}/
          [[ "$(ls output/${{ matrix.package }}/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpms-${{ matrix.package }}
          path: output/${{ matrix.package }}/*.rpm
          retention-days: 1

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: true

      - name: List all RPMs
        run: |
          echo "All RPMs:"
          ls -lh all-rpms/
          [[ "$(ls all-rpms/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "pkgs-rpm" \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag \
            || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "pkgs-rpm" \
            --repo ${{ github.repository }} \
            --title "pkgs-rpm" \
            --latest=false \
            --notes "**built:** \`$(date -u '+%Y-%m-%d %H:%M UTC')\`" \
            all-rpms/*.rpm

  update-repo:
    name: Update DNF repo metadata
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          repository: zodium-project/zodium-project.github.io
          token: ${{ secrets.REPO_PAT }}
          path: website

      - name: Install createrepo
        run: sudo apt-get install -y createrepo-c

      - name: Download all RPMs
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: true

      - name: Update repodata
        run: |
          REPODIR="website/repo/pkgs/x86_64"
          mkdir -p "$REPODIR"
          rm -rf "$REPODIR"/repodata

          # Generate repodata from RPMs but don't copy RPMs into website repo
          TMPDIR=$(mktemp -d)
          cp all-rpms/*.rpm "$TMPDIR/"
          createrepo_c \
            --baseurl "https://github.com/zodium-project/pkgs-zodium/releases/download/pkgs-rpm/" \
            "$TMPDIR"

          # Only copy repodata (no RPMs) into website repo
          cp -r "$TMPDIR/repodata" "$REPODIR/"

      - name: Commit and push repodata
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "repo: update repodata $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push